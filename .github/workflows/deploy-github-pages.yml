# 仓库根 = 宣传站；含 frontend/ 时在 CI 内构建 demo/，再发布静态站（不注入 VITE_PAGES_BASE，与 Vite base: ./ 一致）。
name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-marketing-standalone
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install site devDependencies (Vite)
        run: npm ci
        working-directory: .

      - name: Build embedded demo into demo/
        run: npm run build
        working-directory: .

      - name: Assemble static site (exclude node_modules & build cruft)
        run: |
          rm -rf _site_publish
          mkdir -p _site_publish
          rsync -a \
            --exclude node_modules \
            --exclude frontend/node_modules \
            --exclude frontend/dist \
            --exclude .git \
            ./ _site_publish/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site_publish

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
